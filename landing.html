<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new landing page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            line-height: 1.8;
            background-color: rgb(0, 255, 4);
            color: blue;
        }
    
         header{
            background-color: rgb(77, 204, 151);
            display: flex;
            justify-content: space-between;
         }   
            
    
        nav a{
            text-decoration: none;
            color: black;
            justify-content: center;
        }
        nav a:hover{
            background-color: blueviolet;
            text-decoration: underline;
        }
        .hero{
            height: 60vh;
            background-color: azure;
            
            justify-content: center;
            text-align: center;
            padding: 100px;
           
        }
        button{
            background-color: aqua;
            padding: 15px;
            border-radius: 6px;
            border: none;
        }
        button:hover{
            background-color: antiquewhite;
        }
        footer{
            background-color: black;
            color: aliceblue;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>NEW LANDING PAGE</h1>
       <nav>
        <a href="#">HOME</a>
        <a href="#">CONTACT</a>
       </nav>
    </header>
    <section class="hero">
       <h1> THIS IS THE HERO SECTION</h1>
        <p>this is my landing page layouts</p>
         <button>click here</button>
    </section>
   
    <footer>this is footer</footer>
</body>
</html>
